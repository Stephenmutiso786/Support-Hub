services:
  db:
    image: postgres:16-alpine
    container_name: supporthub-db
    environment:
      POSTGRES_DB: supporthub
      POSTGRES_USER: supporthub
      POSTGRES_PASSWORD: supporthub
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supporthub -d supporthub"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: supporthub-backend
    environment:
      NODE_ENV: production
      PORT: 8081
      DATABASE_URL: postgres://supporthub:supporthub@db:5432/supporthub
      SESSION_TTL_HOURS: 24
      TELEPHONY_API_KEY: dev-telephony-key
      TELEPHONY_WEBHOOK_SECRET: ${TELEPHONY_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"

  ami-bridge:
    build:
      context: ./backend
    container_name: supporthub-ami-bridge
    command: ["node", "scripts/ami-bridge.js"]
    environment:
      AMI_HOST: host.docker.internal
      AMI_PORT: 5038
      AMI_USERNAME: supporthub
      AMI_SECRET: change-this
      BACKEND_BASE_URL: http://backend:8081
      TELEPHONY_API_KEY: dev-telephony-key
      TELEPHONY_WEBHOOK_SECRET: ${TELEPHONY_WEBHOOK_SECRET:-}
      AMI_CLIENT_ID: 1
      AMI_QUEUE_NAME: support-main
      AMI_RECONNECT_MS: 5000
      AMI_DEDUPE_WINDOW_MS: 4000
      AMI_STALE_CALL_MS: 21600000
      BRIDGE_HEALTH_PORT: 9091
      BRIDGE_OUTBOX_PATH: /var/lib/supporthub/ami-outbox.ndjson
      BRIDGE_REPLAY_INTERVAL_MS: 5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bridge_outbox:/var/lib/supporthub
    depends_on:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9091/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  proxy:
    image: nginx:1.27-alpine
    container_name: supporthub-proxy
    depends_on:
      - backend
    ports:
      - "8090:80"
    volumes:
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  bridge_outbox:
