services:
  db:
    image: postgres:16-alpine
    container_name: supporthub-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: supporthub
      POSTGRES_USER: supporthub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supporthub -d supporthub"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: supporthub-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8081
      DATABASE_URL: postgres://supporthub:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/supporthub
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      TELEPHONY_API_KEY: ${TELEPHONY_API_KEY:?TELEPHONY_API_KEY is required}
      TELEPHONY_WEBHOOK_SECRET: ${TELEPHONY_WEBHOOK_SECRET:?TELEPHONY_WEBHOOK_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      TRUST_PROXY: "1"
    depends_on:
      db:
        condition: service_healthy

  ami-bridge:
    build:
      context: ./backend
    container_name: supporthub-ami-bridge-prod
    restart: unless-stopped
    command: ["node", "scripts/ami-bridge.js"]
    environment:
      AMI_HOST: ${AMI_HOST:-127.0.0.1}
      AMI_PORT: ${AMI_PORT:-5038}
      AMI_USERNAME: ${AMI_USERNAME:?AMI_USERNAME is required}
      AMI_SECRET: ${AMI_SECRET:?AMI_SECRET is required}
      BACKEND_BASE_URL: http://backend:8081
      TELEPHONY_API_KEY: ${TELEPHONY_API_KEY:?TELEPHONY_API_KEY is required}
      TELEPHONY_WEBHOOK_SECRET: ${TELEPHONY_WEBHOOK_SECRET:?TELEPHONY_WEBHOOK_SECRET is required}
      AMI_CLIENT_ID: ${AMI_CLIENT_ID:-1}
      AMI_QUEUE_NAME: ${AMI_QUEUE_NAME:-support-main}
      AMI_RECONNECT_MS: ${AMI_RECONNECT_MS:-5000}
      AMI_DEDUPE_WINDOW_MS: ${AMI_DEDUPE_WINDOW_MS:-4000}
      AMI_STALE_CALL_MS: ${AMI_STALE_CALL_MS:-21600000}
      BRIDGE_HEALTH_PORT: ${BRIDGE_HEALTH_PORT:-9091}
      BRIDGE_OUTBOX_PATH: ${BRIDGE_OUTBOX_PATH:-/var/lib/supporthub/ami-outbox.ndjson}
      BRIDGE_REPLAY_INTERVAL_MS: ${BRIDGE_REPLAY_INTERVAL_MS:-5000}
    volumes:
      - bridge_outbox_prod:/var/lib/supporthub
    depends_on:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9091/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.8-alpine
    container_name: supporthub-caddy-prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata_prod:
  caddy_data:
  caddy_config:
  bridge_outbox_prod:
