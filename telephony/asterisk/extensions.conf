[globals]
SUPPORTHUB_QUEUE=support-main

[from-trunk]
exten => _X.,1,NoOp(Inbound support call ${CALLERID(num)})
 same => n,Answer()
 same => n,Set(CHANNEL(hangup_handler_push)=supporthub-hangup,s,1)
 same => n,Set(__CALL_ID=${UNIQUEID})
 same => n,Set(__RECORD_FILE=/var/spool/asterisk/monitor/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID}.wav)
 same => n,MixMonitor(${RECORD_FILE})
 same => n,Queue(${SUPPORTHUB_QUEUE},t,,45)
 same => n,Hangup()

[supporthub-agents]
exten => _10XX,1,Dial(PJSIP/${EXTEN},20)
 same => n,Hangup()

[supporthub-hangup]
exten => s,1,NoOp(Hangup handler for ${CALL_ID})
 same => n,System(curl -s -X POST http://127.0.0.1:8081/api/v1/telephony/events \
  -H 'Content-Type: application/json' \
  -H 'x-telephony-key: dev-telephony-key' \
  -d '{"event":"completed","external_call_id":"${CALL_ID}","client_id":1,"caller_number":"${CALLERID(num)}","direction":"inbound","duration_seconds":${CDR(billsec)}}' >/dev/null 2>&1)
 same => n,Return()
